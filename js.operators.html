<body>
    <script>
       /* =	x = y	x = y	x = 5
+=	x += y	x = x + y	x = 15
-=	x -= y	x = x - y	x = 5
*=	x *= y	x = x * y	x = 50
**=	x **= y	x = x ** y	x = 100000
/=	x /= y	x = x / y	x = 2
%=	x %= y	x = x % y	x = 0
:	x: 45	size.x = 45	x = 45*/

    </script>
    <h1>The = Operator</h1>
    <script>
        let r = 10;
        r = 10
        document.write(r = 10)
            </script>
            <h1>The += Operator</h1>
            <script>
                let t = 14;
                t += 14;
                document.write(t += 14)
            </script>
            
        </script>
<h1>The -= operator </h1>
<br>
<script>
    let y = 11;
    y -= 11;
    document.write(y -= 11)
</script>
<br>
<h1>the *= operator </h1>
<script>
    let u = 60;
    u *= 60;
    document.write(u *= 60)
</script>
<h1>the %= operator</h1>
<script>
    let i = 13;
    i %= 13;
    document.write(i %= 13)
</script>
<h1>th /= operator </h1>
<script>
    let o = 56;
    o /= 56;
    document.write(o /= 56)
</script>
<h1>th ** operator </h1>
<script>
    let p = 90;
    p ** 90;
    document.write(p ** 90)
</script>
